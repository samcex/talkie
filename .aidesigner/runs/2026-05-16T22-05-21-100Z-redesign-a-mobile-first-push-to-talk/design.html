<!DOCTYPE html>
<html lang="en" class="antialiased bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Talkie PWA</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Typography: Satoshi (UI) & JetBrains Mono (Data) -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Satoshi', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        zinc: {
                            850: '#202022',
                            950: '#09090b',
                        },
                        emerald: {
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                        }
                    },
                    boxShadow: {
                        'tactile-up': '0 -1px 2px rgba(255,255,255,0.1) inset, 0 4px 6px rgba(0,0,0,0.5)',
                        'tactile-down': '0 2px 4px rgba(0,0,0,0.8) inset, 0 1px 0 rgba(255,255,255,0.05)',
                        'ptt-idle': '0 0 0 1px rgba(255,255,255,0.05) inset, 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.2)',
                        'ptt-active': '0 0 0 2px #10b981 inset, 0 0 40px -10px rgba(16, 185, 129, 0.5), 0 2px 4px rgba(0,0,0,0.8) inset',
                    },
                    backgroundImage: {
                        'machined-metal': 'linear-gradient(180deg, rgba(39,39,42,1) 0%, rgba(24,24,27,1) 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Base PWA Overrides */
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Tactical Noise Overlay */
        .noise-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            opacity: 0.2;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        /* Animations */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            80% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @keyframes vu-meter {
            0%, 100% { height: 4px; }
            20% { height: 16px; }
            40% { height: 8px; }
            60% { height: 20px; }
            80% { height: 12px; }
        }

        .anim-pulse-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: inherit;
            border: 2px solid #10b981;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            z-index: -1;
        }

        .vu-bar {
            width: 3px;
            background-color: #10b981;
            border-radius: 2px;
            transform-origin: bottom;
            animation: vu-meter 0.5s ease-in-out infinite alternate;
        }
        .vu-bar:nth-child(2) { animation-delay: 0.1s; }
        .vu-bar:nth-child(3) { animation-delay: 0.2s; }
        .vu-bar:nth-child(4) { animation-delay: 0.05s; }

        /* Complex Layout Specifics */
        .glass-panel {
            background: rgba(24, 24, 27, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .ptt-container::before {
            content: '';
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            background: radial-gradient(circle at center, rgba(16, 185, 129, 0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        
        .is-transmitting .ptt-container::before {
            opacity: 1;
        }

        /* Utility for 1px inset border */
        .inset-border {
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="flex justify-center bg-black">

<!-- Desktop shell to force mobile view, while remaining full width on actual mobile -->
<div class="w-full max-w-[430px] h-[100dvh] bg-zinc-950 relative overflow-hidden shadow-2xl flex flex-col font-sans text-zinc-100 ring-1 ring-white/10 sm:my-0">
    
    <div class="noise-overlay"></div>

    <!-- MAIN INTERFACE -->
    <div id="mainView" class="flex-1 flex flex-col h-full z-10 block transition-transform duration-500 will-change-transform">
        
        <!-- Top Status Bar & Navigation -->
        <header class="pt-12 pb-4 px-6 flex items-center justify-between shrink-0 glass-panel border-b-0 rounded-b-3xl z-20">
            <div class="flex items-center gap-3">
                <div class="relative w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center inset-border overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80" alt="Current User" class="w-full h-full object-cover opacity-90">
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Callsign</span>
                    <span class="text-sm font-semibold tracking-tight text-zinc-100">Bravo-Actual</span>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center inset-border active:scale-95 transition-transform text-zinc-400 hover:text-white">
                    <i class="ph ph-bluetooth-connected text-lg"></i>
                </button>
                <button class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center inset-border active:scale-95 transition-transform text-zinc-400 hover:text-white">
                    <i class="ph ph-sliders hover:rotate-90 transition-transform text-lg"></i>
                </button>
            </div>
        </header>

        <!-- Scrollable Ecosystem -->
        <main class="flex-1 overflow-y-auto no-scrollbar pb-48 pt-6 px-4 flex flex-col gap-6 relative z-0">
            
            <!-- Context: Active Channel Data -->
            <section class="bg-machined-metal rounded-[2rem] p-6 inset-border shadow-2xl relative overflow-hidden group">
                <!-- Decorative map lines in background -->
                <svg class="absolute inset-0 w-full h-full opacity-10 pointer-events-none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M-10,50 Q40,20 100,50 T300,50" fill="none" class="stroke-emerald-500" stroke-width="0.5"/>
                    <path d="M-10,80 Q60,120 150,80 T350,80" fill="none" class="stroke-zinc-500" stroke-width="0.5"/>
                </svg>

                <div class="flex justify-between items-start mb-6 align-top relative z-10">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.8)]"></span>
                            <span class="text-xs uppercase tracking-widest text-emerald-500 font-bold">Encrypted Link</span>
                        </div>
                        <h1 class="text-3xl font-black tracking-tighter text-white uppercase">Echo Squad</h1>
                    </div>
                    
                    <button class="bg-zinc-800/80 p-2 rounded-xl text-zinc-400 hover:text-white transition-colors inset-border">
                        <i class="ph ph-lock-key text-xl"></i>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4 relative z-10">
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] uppercase text-zinc-500 font-bold tracking-wider">Frequency</span>
                        <div class="font-mono text-zinc-200 tracking-tight text-lg">144.250 <span class="text-zinc-500 text-sm">MHz</span></div>
                    </div>
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] uppercase text-zinc-500 font-bold tracking-wider">Uptime</span>
                        <div class="font-mono text-zinc-200 tracking-tight text-lg" id="uptime">04:22:19</div>
                    </div>
                </div>
            </section>

            <!-- Active Participants Grid -->
            <section class="flex flex-col gap-3">
                <div class="flex justify-between items-end px-2">
                    <h2 class="text-sm font-bold text-zinc-400 uppercase tracking-widest">Active On Comms</h2>
                    <span class="font-mono text-xs text-zinc-600">4 / 12</span>
                </div>

                <div class="grid grid-cols-2 gap-3" id="participant-grid">
                    <!-- Participant: Speaking -->
                    <div class="bg-zinc-900/80 rounded-2xl p-3 flex items-center gap-3 inset-border relative overflow-hidden border border-emerald-500/30 shadow-[0_0_15px_-5px_rgba(16,185,129,0.2)]">
                        <div class="relative w-10 h-10 rounded-full flex-shrink-0 z-10 anim-pulse-ring">
                            <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?auto=format&fit=crop&w=100&q=80" alt="J. Miller" class="w-full h-full rounded-full object-cover border-2 border-emerald-500 relative z-10">
                        </div>
                        <div class="flex flex-col min-w-0 flex-1 z-10">
                            <span class="text-sm font-bold truncate text-white">J. Miller</span>
                            <div class="flex items-end h-3 gap-[2px] mt-1 text-emerald-500">
                                <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
                            </div>
                        </div>
                        <div class="absolute right-0 top-0 bottom-0 w-16 bg-gradient-to-l from-emerald-500/10 to-transparent pointer-events-none"></div>
                    </div>

                    <!-- Participant: Idle -->
                    <div class="bg-zinc-900/50 rounded-2xl p-3 flex items-center gap-3 inset-border opacity-70">
                        <div class="relative w-10 h-10 rounded-full flex-shrink-0 bg-zinc-800">
                            <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=100&q=80" alt="S. Chen" class="w-full h-full rounded-full object-cover opacity-80 filter grayscale">
                        </div>
                        <div class="flex flex-col min-w-0 flex-1">
                            <span class="text-sm font-semibold truncate text-zinc-300">S. Chen</span>
                            <span class="text-[10px] text-zinc-500 font-mono mt-0.5">STANDBY</span>
                        </div>
                    </div>

                    <!-- Participant: Idle -->
                    <div class="bg-zinc-900/50 rounded-2xl p-3 flex items-center gap-3 inset-border opacity-70">
                        <div class="w-10 h-10 rounded-full flex-shrink-0 bg-zinc-800 flex items-center justify-center text-zinc-500">
                            <i class="ph-bold ph-user text-xl"></i>
                        </div>
                        <div class="flex flex-col min-w-0 flex-1">
                            <span class="text-sm font-semibold truncate text-zinc-300">M. Davis</span>
                            <span class="text-[10px] text-zinc-500 font-mono mt-0.5">STANDBY</span>
                        </div>
                    </div>

                    <!-- Add User Button -->
                    <button class="bg-transparent border border-dashed border-zinc-700 rounded-2xl p-3 flex items-center gap-3 justify-center text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900/50 transition-all active:scale-95">
                        <i class="ph-bold ph-plus text-lg"></i>
                        <span class="text-sm font-bold uppercase tracking-wider">Invite</span>
                    </button>
                </div>
            </section>

            <!-- Divider -->
            <div class="h-px w-full bg-gradient-to-r from-transparent via-zinc-800 to-transparent my-2"></div>

            <!-- Recent Channels (Denser List) -->
            <section class="flex flex-col gap-1 pb-10">
                <div class="flex justify-between items-center px-2 mb-2">
                    <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Recent Frequencies</h2>
                    <button onclick="toggleJoinModal()" class="text-xs text-emerald-500 font-bold uppercase tracking-wider flex items-center gap-1 bg-emerald-500/10 px-2 py-1 rounded-md">
                        <i class="ph-bold ph-hash"></i> Join New
                    </button>
                </div>
                
                <!-- List Item -->
                <div class="group flex items-center justify-between p-3 rounded-xl hover:bg-zinc-900 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 rounded-lg bg-zinc-800 flex items-center justify-center inset-border text-zinc-400">
                            <i class="ph-bold ph-hash"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-zinc-200">Logistics Alpha</span>
                            <span class="text-xs font-mono text-zinc-500">144.100 MHz</span>
                        </div>
                    </div>
                    <button class="w-8 h-8 rounded-full bg-zinc-800 text-zinc-400 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="ph ph-arrow-right"></i>
                    </button>
                </div>

                <!-- List Item (Private) -->
                <div class="group flex items-center justify-between p-3 rounded-xl hover:bg-zinc-900 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 rounded-lg bg-red-900/20 text-red-500 flex items-center justify-center inset-border border-red-500/10">
                            <i class="ph-bold ph-lock-key"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-zinc-200">Command Secure</span>
                            <span class="text-xs font-mono text-zinc-500">145.850 MHz</span>
                        </div>
                    </div>
                    <button class="w-8 h-8 rounded-full bg-zinc-800 text-zinc-400 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="ph ph-arrow-right"></i>
                    </button>
                </div>
            </section>
        </main>

        <!-- BOTTOM CONTROL DOCK -->
        <div class="absolute bottom-0 left-0 right-0 h-40 glass-panel border-t border-zinc-800 z-40 rounded-t-[2.5rem] flex items-center justify-center pt-2 pb-8 px-6">
            
            <div class="flex items-center justify-between w-full max-w-sm relative">
                
                <!-- Chat Action -->
                <button class="aspect-square w-14 rounded-2xl bg-zinc-900 flex flex-col items-center justify-center gap-1 shadow-tactile-up active:shadow-tactile-down transition-all group relative">
                    <!-- Notification dot -->
                    <span class="absolute top-2 right-2 w-2 h-2 rounded-full bg-emerald-500"></span>
                    <i class="ph-fill ph-chat-teardrop-text text-xl text-zinc-400 group-hover:text-white"></i>
                    <span class="text-[9px] font-bold text-zinc-500 uppercase">Chat</span>
                </button>

                <!-- THE PUSH TO TALK BUTTON (Hero Element) -->
                <div class="relative w-28 h-28 flex items-center justify-center -translate-y-6 ptt-container" id="ptt-wrapper">
                    
                    <!-- Outer Bezel -->
                    <div class="absolute inset-0 rounded-full bg-zinc-900 shadow-[inset_0_4px_10px_rgba(0,0,0,0.8),_0_2px_0_rgba(255,255,255,0.05)] border-4 border-zinc-950"></div>
                    
                    <!-- The Physical Button -->
                    <button 
                        id="ptt-btn"
                        class="absolute w-24 h-24 rounded-full bg-gradient-to-b from-zinc-700 to-zinc-900 shadow-ptt-idle flex flex-col items-center justify-center gap-1 transition-all duration-150 select-none z-10 border border-zinc-600 focus:outline-none"
                    >
                        <!-- Status LED inner -->
                        <div id="ptt-led" class="w-2 h-2 rounded-full bg-red-500 mb-1 shadow-[0_0_8px_rgba(239,68,68,0.8)] transition-colors duration-200"></div>
                        <i class="ph-fill ph-microphone-stage text-2xl text-zinc-200 pointer-events-none" id="ptt-icon"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400 pointer-events-none" id="ptt-label">Push</span>
                    </button>
                    
                    <!-- Dynamic TX Status Text below button -->
                    <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 w-max text-center opacity-0 transition-opacity duration-200" id="tx-status">
                        <span class="text-[10px] uppercase font-bold text-emerald-500 tracking-widest flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            Transmitting
                        </span>
                    </div>
                </div>

                <!-- Replay Action -->
                <button class="aspect-square w-14 rounded-2xl bg-zinc-900 flex flex-col items-center justify-center gap-1 shadow-tactile-up active:shadow-tactile-down transition-all group">
                    <i class="ph-bold ph-clock-counter-clockwise text-xl text-zinc-400 group-hover:text-white"></i>
                    <span class="text-[9px] font-bold text-zinc-500 uppercase">Replay</span>
                </button>
            </div>
            
            <!-- iOS Safe Area padding block visually -->
            <div class="absolute bottom-2 w-1/3 h-1 bg-zinc-600 rounded-full left-1/2 -translate-x-1/2 opacity-30"></div>
        </div>
    </div>

    <!-- MODAL: JOIN / PIN ENTRY -->
    <div id="joinModal" class="absolute inset-0 z-50 translate-y-full transition-transform duration-500 cubic-bezier(0.19, 1, 0.22, 1) flex flex-col justify-end">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-500 cursor-pointer" id="joinBackdrop" onclick="toggleJoinModal()"></div>
        
        <!-- Sheet Content -->
        <div class="bg-zinc-900 w-full h-[85dvh] rounded-t-[2.5rem] relative flex flex-col p-6 shadow-[0_-20px_50px_rgba(0,0,0,0.5)] border-t border-zinc-700/50">
            <!-- Drag Handle -->
            <div class="w-12 h-1.5 bg-zinc-700 rounded-full mx-auto mb-6"></div>
            
            <h3 class="text-2xl font-black uppercase tracking-tight text-white mb-2 text-center">Join Channel</h3>
            <p class="text-sm text-zinc-400 text-center mb-8 font-mono">Enter PIN or Frequency ID</p>

            <!-- PIN Display -->
            <div class="flex justify-center gap-3 mb-10">
                <div class="w-12 h-14 rounded-xl bg-zinc-950 inset-border flex items-center justify-center text-2xl font-mono text-emerald-500 font-bold shadow-inner">4</div>
                <div class="w-12 h-14 rounded-xl bg-zinc-950 inset-border flex items-center justify-center text-2xl font-mono text-emerald-500 font-bold shadow-inner border border-emerald-500/30">7</div>
                <div class="w-12 h-14 rounded-xl bg-zinc-950 flex items-center justify-center shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)] border border-transparent">
                    <div class="w-3 h-3 rounded-full bg-zinc-700 animate-pulse"></div>
                </div>
                <div class="w-12 h-14 rounded-xl bg-zinc-950 flex items-center justify-center shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)] border border-transparent">
                    <div class="w-2 h-2 rounded-full bg-zinc-800"></div>
                </div>
            </div>

            <!-- Numpad (Architectural Grid) -->
            <div class="grid grid-cols-3 gap-3 max-w-[280px] mx-auto w-full flex-1 mb-8">
                <!-- Numbers 1-9 generated statically for performance/look -->
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">1</button>
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">2 <span class="text-[10px] text-zinc-500 font-sans tracking-widest">ABC</span></button>
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">3 <span class="text-[10px] text-zinc-500 font-sans tracking-widest">DEF</span></button>
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">4 <span class="text-[10px] text-zinc-500 font-sans tracking-widest">GHI</span></button>
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">5 <span class="text-[10px] text-zinc-500 font-sans tracking-widest">JKL</span></button>
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">6 <span class="text-[10px] text-zinc-500 font-sans tracking-widest">MNO</span></button>
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">7 <span class="text-[10px] text-zinc-500 font-sans tracking-widest">PQRS</span></button>
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">8 <span class="text-[10px] text-zinc-500 font-sans tracking-widest">TUV</span></button>
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">9 <span class="text-[10px] text-zinc-500 font-sans tracking-widest">WXYZ</span></button>
                
                <button class="aspect-square rounded-2xl flex items-center justify-center active:scale-95 transition-transform text-zinc-500 hover:text-white"><i class="ph-bold ph-fingerprint text-3xl"></i></button>
                <button class="aspect-square bg-zinc-850 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform shadow-tactile-up text-2xl font-mono font-bold text-white">0</button>
                <button class="aspect-square rounded-2xl flex items-center justify-center active:scale-95 transition-transform text-zinc-500 hover:text-white"><i class="ph-fill ph-backspace text-2xl"></i></button>
            </div>
            
            <button class="w-full bg-emerald-500 text-black font-black uppercase text-lg py-5 rounded-2xl active:scale-[0.98] transition-all shadow-[0_10px_20px_-5px_rgba(16,185,129,0.4)]">
                Connect Link
            </button>
        </div>
    </div>

</div>

<!-- Interactive Logic -->
<script>
    // --- Push To Talk Physics ---
    const pttBtn = document.getElementById('ptt-btn');
    const pttWrapper = document.getElementById('ptt-wrapper');
    const pttLed = document.getElementById('ptt-led');
    const pttIcon = document.getElementById('ptt-icon');
    const pttLabel = document.getElementById('ptt-label');
    const txStatus = document.getElementById('tx-status');
    
    // Support Touch and Mouse for PTT
    const startTX = (e) => {
        if(e.cancelable) e.preventDefault(); // Prevent scroll/zoom on mobile
        navigator.vibrate && navigator.vibrate(15); // Haptic feedback
        
        // Visuals: Button sinks in
        pttBtn.classList.remove('shadow-ptt-idle');
        pttBtn.classList.add('shadow-ptt-active');
        pttBtn.style.transform = 'translateY(4px)';
        
        // Visuals: LED turns Green, wrappers glow
        pttLed.classList.remove('bg-red-500', 'shadow-[0_0_8px_rgba(239,68,68,0.8)]');
        pttLed.classList.add('bg-emerald-500', 'shadow-[0_0_15px_rgba(16,185,129,1)]');
        pttIcon.classList.remove('text-zinc-200');
        pttIcon.classList.add('text-emerald-500');
        pttLabel.innerText = "TX";
        pttLabel.classList.add('text-emerald-500');
        
        pttWrapper.classList.add('is-transmitting');
        txStatus.classList.remove('opacity-0');
    };

    const stopTX = (e) => {
        if(e.cancelable) e.preventDefault();
        
        // Visuals: Button pops out
        pttBtn.classList.remove('shadow-ptt-active');
        pttBtn.classList.add('shadow-ptt-idle');
        pttBtn.style.transform = 'translateY(0)';
        
        // Visuals: Revert LED
        pttLed.classList.add('bg-red-500', 'shadow-[0_0_8px_rgba(239,68,68,0.8)]');
        pttLed.classList.remove('bg-emerald-500', 'shadow-[0_0_15px_rgba(16,185,129,1)]');
        pttIcon.classList.add('text-zinc-200');
        pttIcon.classList.remove('text-emerald-500');
        pttLabel.innerText = "Push";
        pttLabel.classList.remove('text-emerald-500');

        pttWrapper.classList.remove('is-transmitting');
        txStatus.classList.add('opacity-0');
    };

    // Bind events
    pttBtn.addEventListener('mousedown', startTX);
    pttBtn.addEventListener('touchstart', startTX, {passive: false});
    
    // Listen on window to catch touch releases outside element
    window.addEventListener('mouseup', stopTX);
    window.addEventListener('touchend', stopTX);


    // --- Uptime Clock ---
    // Make the UI feel alive by ticking the uptime clock
    let baseSeconds = 15739; // 04:22:19
    const uptimeEl = document.getElementById('uptime');
    
    setInterval(() => {
        baseSeconds++;
        const h = Math.floor(baseSeconds / 3600).toString().padStart(2, '0');
        const m = Math.floor((baseSeconds % 3600) / 60).toString().padStart(2, '0');
        const s = (baseSeconds % 60).toString().padStart(2, '0');
        uptimeEl.innerText = `${h}:${m}:${s}`;
    }, 1000);


    // --- Modal Logic ---
    let modalOpen = false;
    const modal = document.getElementById('joinModal');
    const backdrop = document.getElementById('joinBackdrop');
    const mainView = document.getElementById('mainView');

    function toggleJoinModal() {
        modalOpen = !modalOpen;
        if (modalOpen) {
            // Open
            modal.classList.remove('translate-y-full');
            backdrop.classList.remove('opacity-0');
            backdrop.classList.add('opacity-100');
            backdrop.style.pointerEvents = 'auto';
            
            // Push main view back slightly for depth (iOS style)
            mainView.style.transform = 'scale(0.95) translateY(-10px)';
            mainView.style.filter = 'blur(4px)';
            mainView.style.opacity = '0.5';
        } else {
            // Close
            modal.classList.add('translate-y-full');
            backdrop.classList.add('opacity-0');
            backdrop.classList.remove('opacity-100');
            backdrop.style.pointerEvents = 'none';
            
            mainView.style.transform = 'scale(1) translateY(0)';
            mainView.style.filter = 'none';
            mainView.style.opacity = '1';
        }
    }
</script>
</body>
</html>
