name: Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
  workflow_dispatch:
    inputs:
      token_base_url:
        description: "Base URL the APK will hit for token issuance (e.g. https://talkie.netlify.app). Leave blank to use the default in build.gradle.kts."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: |
          ARGS=""
          if [ -n "${{ inputs.token_base_url }}" ]; then
            ARGS="-PTALKIE_TOKEN_BASE_URL=${{ inputs.token_base_url }}"
          fi
          ./gradlew :app:assembleDebug --no-daemon $ARGS

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: talkie-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
