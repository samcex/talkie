<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Talkie offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        color: #f5f5f5;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(28rem, calc(100vw - 3rem));
        text-align: center;
      }

      img {
        width: 4rem;
        height: 4rem;
      }

      h1 {
        margin: 1rem 0 0.5rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        color: #a3a3a3;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon.svg" alt="Talkie" />
      <h1>Talkie is offline</h1>
      <p>Reconnect to join channels, send messages, and use push-to-talk.</p>
    </main>
  </body>
</html>
